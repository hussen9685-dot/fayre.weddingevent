/* ═══ รายรับต่องาน (รวมรายการเสริม เช่น ค่าน้ำมัน ช่อดอกไม้ แพ็คเกจเสริม) ═══ */
function jobExtrasTotal(j,onlyReceived){
  return (j.income?.extras||[]).reduce((s,x)=>s+((!onlyReceived||x.received)?Number(x.amount)||0:0),0);
}
function jobReceivedTotal(j){
  const dep=j.income?.deposit?.received?Number(j.income.deposit.amount)||0:0;
  const rem=j.income?.remaining?.received?Number(j.income.remaining.amount)||0:0;
  return dep+rem+jobExtrasTotal(j,true);
}
function jobExpectedTotal(j){
  return (Number(j.agreedPrice)||0)+jobExtrasTotal(j,false);
}
/* แต่ละรายการรับเงิน (มัดจำ/ยอดคงเหลือ/รายการเสริม) จะ "ล็อก" สัดส่วนแบ่ง ณ ตอนที่ติ๊กรับเงินแล้ว
   เก็บไว้ที่ item.ratio — ถ้าไม่มี (ข้อมูลเก่าก่อนมีฟีเจอร์นี้) จะ fallback เป็น DEFAULT_RATIO (60/20/15/5) */
function jobPoolCuts(j){
  let jobBudget=0, workingCapital=0, dividend=0, bonus=0, received=0;
  const add=item=>{
    if(!item||!item.received) return;
    const amt=Number(item.amount)||0;
    const r=item.ratio||DEFAULT_RATIO;
    jobBudget+=amt*(Number(r.jobBudget)||0)/100;
    workingCapital+=amt*(Number(r.workingCapital)||0)/100;
    dividend+=amt*(Number(r.dividend)||0)/100;
    bonus+=amt*(Number(r.bonus)||0)/100;
    received+=amt;
  };
  add(j.income?.deposit);
  add(j.income?.remaining);
  (j.income?.extras||[]).forEach(add);
  return {jobBudget,workingCapital,dividend,bonus,received};
}

/* ═══ POOL CALCULATOR — แบ่งรายรับแต่ละงานตามสัดส่วนที่ล็อกไว้ ณ ตอนรับเงิน (ตั้งค่าได้ในหน้าตั้งค่า) ═══ */
function computePools(state){
  const jobs=state.jobs||[], divs=state.divs||[], companyExpenses=state.companyExpenses||[], transfers=state.transfers||[];
  let totalReceived=0, totalExpected=0, workingCapitalPoolTotal=0, dividendPoolTotal=0, bonusPoolTotal=0;
  const jobBudgets={};
  jobs.forEach(j=>{
    const cuts=jobPoolCuts(j);
    totalReceived+=cuts.received;
    totalExpected+=jobExpectedTotal(j);
    workingCapitalPoolTotal+=cuts.workingCapital;
    dividendPoolTotal+=cuts.dividend;
    bonusPoolTotal+=cuts.bonus;
    const spent=(j.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
    jobBudgets[j.id]={received:cuts.received,budget60:cuts.jobBudget,spent,remaining:cuts.jobBudget-spent};
  });
  const netTransfer=pool=>transfers.reduce((s,t)=>s+(t.to===pool?Number(t.amount||0):0)-(t.from===pool?Number(t.amount||0):0),0);
  const workingCapitalSpent=companyExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const workingCapitalBalance=workingCapitalPoolTotal-workingCapitalSpent+netTransfer('workingCapital');
  const dividendPaidTotal=divs.reduce((s,d)=>s+Number(d.totalAmount||0),0);
  const dividendPoolBalance=dividendPoolTotal-dividendPaidTotal+netTransfer('dividend');
  const bonusPaidTotal=divs.reduce((s,d)=>s+((d.bonus||d.wages||[]).reduce((a,x)=>a+Number(x.amount||0),0)),0);
  const bonusPoolBalance=bonusPoolTotal-bonusPaidTotal+netTransfer('bonus');
  return {totalReceived,totalExpected,jobBudgets,workingCapitalPoolTotal,workingCapitalSpent,workingCapitalBalance,dividendPoolTotal,dividendPaidTotal,dividendPoolBalance,bonusPoolTotal,bonusPaidTotal,bonusPoolBalance};
}

/* บีบอัดรูปภาพ: crop กลางให้เป็นสี่เหลี่ยมจัตุรัส ย่อขนาด แล้วลดคุณภาพ JPEG จนกว่าจะได้ไฟล์เล็กพอ */
function compressImageFile(file,{maxDim=256,maxBytes=300*1024}={}){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const side=Math.min(img.width,img.height);
        const sx=(img.width-side)/2, sy=(img.height-side)/2;
        const size=Math.min(maxDim,side);
        const canvas=document.createElement('canvas');
        canvas.width=size; canvas.height=size;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,sx,sy,side,side,0,0,size,size);
        let quality=0.9;
        let dataUrl=canvas.toDataURL('image/jpeg',quality);
        while(dataUrl.length*0.75>maxBytes&&quality>0.25){
          quality-=0.1;
          dataUrl=canvas.toDataURL('image/jpeg',quality);
        }
        resolve(dataUrl);
      };
      img.onerror=()=>reject(new Error('โหลดรูปภาพไม่ได้'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('อ่านไฟล์ไม่ได้'));
    reader.readAsDataURL(file);
  });
}

function exportCSV(rows,filename){
  const c='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob([c],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b); const a=document.createElement('a');
  a.href=u; a.download=filename; a.click(); URL.revokeObjectURL(u);
}

}

/* ═══ SCHEDULE ═══ */
function Schedule({state,setPage,setJobId}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const mob=useMobile();
  const MONTHS_TH=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const DAYS_TH=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const prevM=()=>{ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextM=()=>{ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const jobsByDate={};
  state.jobs.forEach(j=>{
    if(j.eventDate){
      const d=new Date(j.eventDate);
      if(d.getFullYear()===year&&d.getMonth()===month){
        const k=d.getDate(); if(!jobsByDate[k]) jobsByDate[k]=[]; jobsByDate[k].push(j);
      }
    }
  });
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  const today=new Date();
  const monthJobs=Object.values(jobsByDate).flat();
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div><h1 style={{fontSize:22,fontWeight:700,color:T.gold}}>ตารางงาน</h1><p style={{color:T.muted,fontSize:13}}>{monthJobs.length} งานในเดือนนี้</p></div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <Btn sm ghost onClick={prevM}>◀</Btn>
          <span style={{fontSize:14,fontWeight:600,minWidth:mob?110:140,textAlign:'center'}}>{MONTHS_TH[month]} {year+543}</span>
          <Btn sm ghost onClick={nextM}>▶</Btn>
        </div>
      </div>
      <Card style={{padding:mob?12:18,marginBottom:20}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:mob?1:4,marginBottom:6}}>
          {DAYS_TH.map(d=><div key={d} style={{textAlign:'center',fontSize:mob?10:12,color:T.muted,padding:'3px 0',fontWeight:600}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:mob?2:4}}>
          {cells.map((day,i)=>{
            if(!day) return <div key={i} style={{minHeight:mob?44:72}}/>;
            const jobs=jobsByDate[day]||[];
            const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
            return (
              <div key={i} style={{background:isToday?T.goldBg:T.s2,border:`1px solid ${isToday?T.gold:T.bdr}`,borderRadius:8,padding:mob?3:6,minHeight:mob?44:72,overflow:'hidden'}}>
                <div style={{fontSize:mob?10:12,fontWeight:isToday?700:400,color:isToday?T.gold:T.muted,marginBottom:2}}>{day}</div>
                {jobs.slice(0,mob?1:2).map(j=>(
                  <div key={j.id} onClick={()=>{setJobId(j.id);setPage('jobs');}}
                    style={{background:STATUS[j.status]?.color+'33',border:`1px solid ${STATUS[j.status]?.color}55`,borderRadius:4,padding:'1px 4px',marginBottom:2,fontSize:mob?8:10,color:STATUS[j.status]?.color,cursor:'pointer',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>
                    {j.clientName}
                  </div>
                ))}
                {jobs.length>(mob?1:2)&&<div style={{fontSize:8,color:T.muted,textAlign:'center'}}>+{jobs.length-(mob?1:2)}</div>}
              </div>
            );
          })}
        </div>
      </Card>
      {monthJobs.length>0&&(
        <div>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12,color:T.text}}>📋 รายการงานเดือน{MONTHS_TH[month]}</h3>
          {Object.entries(jobsByDate).sort((a,b)=>Number(a[0])-Number(b[0])).flatMap(([d,jobs])=>
            jobs.map(j=>{
              const inc=jobReceivedTotal(j);
              const exp=(j.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
              const remaining60=jobPoolCuts(j).jobBudget-exp;
              return (
                <Card key={j.id} onClick={()=>{setJobId(j.id);setPage('jobs');}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                        <span style={{fontWeight:700,fontSize:15}}>{j.clientName}</span>
                        <Badge c={STATUS[j.status]?.color}>{STATUS[j.status]?.label}</Badge>
                      </div>
                      <div style={{fontSize:12,color:T.muted}}>📅 {d} {MONTHS_TH[month]} {year+543}{j.theme&&` · ${j.theme}`}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:14,fontWeight:700,color:remaining60>=0?T.green:T.red}}>คงเหลืองบ {baht(remaining60)}</div>
                      <div style={{fontSize:11,color:T.muted}}>ราคาตกลง {baht(j.agreedPrice)}</div>
                    </div>

}

/* ═══ JOBS ═══ */
function Jobs({state,user,save,jobId,setJobId}){
  const [showForm,setShowForm]=useState(false);
  const [filter,setFilter]=useState('all');
  const mob=useMobile();
  const job=state.jobs.find(j=>j.id===jobId);
  if(job) return <JobDetail job={job} state={state} user={user} save={save} onBack={()=>setJobId(null)}/>;
  
  const deleteJob=async(j,e)=>{
    e.stopPropagation();
    if(!window.confirm(`ลบงาน "${j.clientName}"? ไม่สามารถกู้คืนได้`)) return;
    const jobs=state.jobs.filter(x=>x.id!==j.id);
    const hist=[{id:uid(),type:'delete',desc:`ลบงาน: ${j.clientName}`,userId:user.id,createdAt:ts()},...state.hist].slice(0,500);
    await save({jobs,hist});
  };
  
  const filtered=filter==='all'?state.jobs:state.jobs.filter(j=>j.status===filter);
  const sorted=[...filtered].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div><h1 style={{fontSize:22,fontWeight:700,color:T.gold}}>งานทั้งหมด</h1><p style={{color:T.muted,fontSize:13}}>{filtered.length} งาน</p></div>
        {user.role==='admin'&&<Btn onClick={()=>setShowForm(true)}>+ สร้างงานใหม่</Btn>}
      </div>
      <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
        {[{v:'all',l:'ทั้งหมด'},...Object.entries(STATUS).map(([v,s])=>({v,l:s.label}))].map(o=>(
          <button key={o.v} onClick={()=>setFilter(o.v)} style={{background:filter===o.v?T.goldBg:'transparent',border:`1px solid ${filter===o.v?T.gold:T.bdr}`,borderRadius:20,padding:'5px 14px',color:filter===o.v?T.gold:T.muted,cursor:'pointer',fontSize:13,fontFamily:T.ff,transition:'all .12s'}}>{o.l}</button>
        ))}
      </div>
      {sorted.length===0?<Empty msg="ยังไม่มีงาน"/>:(
        <div>{sorted.map(j=>{
          const inc=jobReceivedTotal(j);
          const exp=(j.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
          const remaining60=jobPoolCuts(j).jobBudget-exp;
          return (
            <Card key={j.id} onClick={()=>setJobId(j.id)} style={{padding:mob?'14px 16px':'18px 22px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:15,fontWeight:700}}>{j.clientName}</span>
                    <Badge c={STATUS[j.status]?.color}>{STATUS[j.status]?.label}</Badge>
                    {(j.statusAlerts||[]).length>0&&<Badge c={T.amber}>🔔 {j.statusAlerts.length}/2</Badge>}
                  </div>
                  <div style={{fontSize:12,color:T.muted}}>📅 {dtTH(j.eventDate)}{j.theme&&` · ${j.theme}`}</div>
                  {!mob&&<div style={{fontSize:12,color:T.muted,marginTop:3}}>รับเงิน {baht(inc)} · ใช้จ่าย {baht(exp)}</div>}
                </div>
                <div style={{display:'flex',gap:6,alignItems:'flex-start',flexShrink:0}}>
                  <div style={{textAlign:'right'}}>
                    {mob&&<div style={{fontSize:12,color:T.muted,marginBottom:2}}>{baht(inc)}</div>}
                    <div style={{fontSize:mob?14:16,fontWeight:700,color:remaining60>=0?T.green:T.red}}>{mob?baht(remaining60):`คงเหลืองบ ${baht(remaining60)}`}</div>
                  </div>
                  {user.role==='admin'&&(
                    <button onClick={e=>deleteJob(j,e)} title="ลบงาน" style={{background:'none',border:`1px solid ${T.red}44`,borderRadius:6,padding:'4px 8px',color:T.red,cursor:'pointer',fontSize:13,fontFamily:T.ff,marginTop:2}}>🗑</button>
                  )}
                </div>
              </div>
            </Card>
          );
        })}</div>
      )}
      {showForm&&<JobForm state={state} user={user} save={save} onClose={()=>setShowForm(false)}/>}
    </div>
  );
}

function JobForm({state,user,save,onClose,job}){
  const [f,setF]=useState(job?{clientName:job.clientName,eventDate:job.eventDate||'',agreedPrice:job.agreedPrice||'',theme:job.theme||'',notes:job.notes||''}:{clientName:'',eventDate:'',agreedPrice:'',theme:'',notes:''});
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const submit=async()=>{
    if(!f.clientName){alert('กรุณากรอกชื่อลูกค้า');return;}
    if(job){
      const jobs=state.jobs.map(j=>j.id===job.id?{...j,...f,agreedPrice:Number(f.agreedPrice)||0}:j);
      const hist=[{id:uid(),type:'edit',desc:`แก้ไขงาน: ${f.clientName}`,userId:user.id,jobId:job.id,createdAt:ts()},...state.hist].slice(0,500);
      await save({jobs,hist});
    } else {
      const nj={id:uid(),createdAt:ts(),createdBy:user.id,status:'pending',statusAlerts:[],expenses:[],
        income:{deposit:{amount:0,received:false,slipData:null},remaining:{amount:0,received:false,slipData:null},extras:[]},
        ...f,agreedPrice:Number(f.agreedPrice)||0};
      const jobs=[...state.jobs,nj];
      const hist=[{id:uid(),type:'create',desc:`สร้างงาน: ${f.clientName}`,userId:user.id,jobId:nj.id,createdAt:ts()},...state.hist].slice(0,500);
      await save({jobs,hist});
    }
    onClose();
  };
  return (
    <Modal title={job?'แก้ไขงาน':'สร้างงานใหม่'} onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Inp label="ชื่อลูกค้า *" value={f.clientName} onChange={set('clientName')} placeholder="ชื่อเจ้าบ่าว/เจ้าสาว"/>
        <Inp label="วันงาน" type="date" value={f.eventDate} onChange={set('eventDate')}/>
        <Inp label="ราคาตกลง (บาท)" type="number" value={f.agreedPrice} onChange={set('agreedPrice')} min="0" step="100" placeholder="0"/>
        <Inp label="ธีมงาน" value={f.theme} onChange={set('theme')} placeholder="เช่น Vintage, Bohemian"/>
        <Inp label="หมายเหตุ" type="textarea" value={f.notes} onChange={set('notes')} placeholder="รายละเอียดเพิ่มเติม"/>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
          <Btn ghost onClick={onClose}>ยกเลิก</Btn>
          <Btn onClick={submit}>{job?'บันทึกการแก้ไข':'สร้างงาน'}</Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ JOB DETAIL ═══ */
function JobDetail({job,state,user,save,onBack}){
  const [tab,setTab]=useState('income');
  const [modals,setModals]=useState({editJob:false,addExp:false,editInc:false});
  const open=k=>setModals(p=>({...p,[k]:true}));
  const close=k=>setModals(p=>({...p,[k]:false}));
  const isAdmin=user.role==='admin';
  const mob=useMobile();
  const totalInc=jobReceivedTotal(job);
  const jobExpected=jobExpectedTotal(job);
  const cuts=jobPoolCuts(job);
  const budget60=cuts.jobBudget;
  const totalExp=(job.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
  const remaining60=budget60-totalExp;
  const workingCapCut=cuts.workingCapital;
  const dividendCut=cuts.dividend;
  const bonusCut=cuts.bonus;
  const netProfit40=workingCapCut+dividendCut+bonusCut;
  const canManageExpense=user.expenseManager===true;
  const expenseManagerUser=state.users.find(u=>u.expenseManager===true);
  const updateJob=async patch=>{const jobs=state.jobs.map(j=>j.id===job.id?{...j,...patch}:j);await save({jobs});};
  const nextStatus=STATUS[job.status]?.next;
  const handleStatusChange=async nst=>{
    if(!isAdmin) return;
    const jobs=state.jobs.map(j=>j.id===job.id?{...j,status:nst,statusAlerts:[]}:j);
    const hist=[{id:uid(),type:'status',desc:`เปลี่ยนสถานะงาน "${job.clientName}" → ${STATUS[nst]?.label}`,userId:user.id,jobId:job.id,createdAt:ts()},...state.hist].slice(0,500);
    const notif={id:uid(),type:'status_change',jobId:job.id,fromUserId:user.id,msg:`Admin อัปเดตสถานะ "${job.clientName}" เป็น ${STATUS[nst]?.label}`,createdAt:ts(),readBy:[]};
    await save({jobs,hist,notifs:[notif,...state.notifs]});
  };
  const handleAlert=async()=>{
    const alerts=[...new Set([...(job.statusAlerts||[]),user.id])];
    let jobs,hist,notifs;
    if(alerts.length>=2&&nextStatus){
      jobs=state.jobs.map(j=>j.id===job.id?{...j,status:nextStatus,statusAlerts:[]}:j);
      const notif={id:uid(),type:'auto_update',jobId:job.id,fromUserId:user.id,msg:`🤖 สถานะ "${job.clientName}" อัปเดตอัตโนมัติเป็น "${STATUS[nextStatus]?.label}"`,createdAt:ts(),readBy:[]};
      hist=[{id:uid(),type:'auto',desc:`อัปเดตสถานะอัตโนมัติ "${job.clientName}" → ${STATUS[nextStatus]?.label}`,userId:user.id,jobId:job.id,createdAt:ts()},...state.hist].slice(0,500);
      notifs=[notif,...state.notifs];
    } else if((job.statusAlerts||[]).includes(user.id)){alert('คุณแจ้งเตือนไปแล้ว');return;}
    else {
      jobs=state.jobs.map(j=>j.id===job.id?{...j,statusAlerts:alerts}:j);
      const notif={id:uid(),type:'alert',jobId:job.id,fromUserId:user.id,msg:`🔔 ${user.name} ขอให้อัปเดตสถานะ "${job.clientName}" (${alerts.length}/2 คนแจ้ง)`,createdAt:ts(),readBy:[],forAdmin:true};
      hist=[{id:uid(),type:'alert',desc:`${user.name} แจ้งเตือน "${job.clientName}"`,userId:user.id,jobId:job.id,createdAt:ts()},...state.hist].slice(0,500);
      notifs=[notif,...state.notifs];
    }
    await save({jobs,hist,notifs});
  };
  const deleteExp=async expId=>{
    if(!window.confirm('ลบรายการนี้?')) return;
    const expenses=(job.expenses||[]).filter(e=>e.id!==expId);
    await save({jobs:state.jobs.map(j=>j.id===job.id?{...j,expenses}:j)});
  };
  const deleteJob=async()=>{
    if(!window.confirm(`ลบงาน "${job.clientName}"? ไม่สามารถกู้คืนได้`)) return;
    const jobs=state.jobs.filter(x=>x.id!==job.id);
    const hist=[{id:uid(),type:'delete',desc:`ลบงาน: ${job.clientName}`,userId:user.id,createdAt:ts()},...state.hist].slice(0,500);
    await save({jobs,hist});
    onBack();
  };
  const uploadSlip=async(field,data)=>{ const income={...job.income,[field]:{...job.income[field],slipData:data}}; await updateJob({income}); };
  const uploadExpSlip=async(expId,data)=>{ const expenses=(job.expenses||[]).map(e=>e.id===expId?{...e,slipData:data}:e); await updateJob({expenses}); };
  const TABS=[{id:'income',label:'รายรับ 💰'},{id:'expenses',label:'ค่าใช้จ่ายงาน 🧾'}];
  return (
    <div>
      <div style={{marginBottom:20}}>
        <button onClick={onBack} style={{background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:8,padding:'8px 14px',color:T.muted,cursor:'pointer',fontSize:13,fontFamily:T.ff,marginBottom:14}}>← กลับ</button>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:6}}>
          <h1 style={{fontSize:mob?17:22,fontWeight:700,color:T.text,minWidth:0,overflowWrap:'break-word'}}>{job.clientName}</h1>
          <Badge c={STATUS[job.status]?.color}>{STATUS[job.status]?.label}</Badge>
        </div>
        <div style={{fontSize:13,color:T.muted,marginBottom:14}}>📅 {dtTH(job.eventDate)}{job.theme&&` · ${job.theme}`} · ราคาตกลง {baht(job.agreedPrice)}</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {isAdmin&&<Btn sm ghost onClick={()=>open('editJob')}>✏️ แก้ไข</Btn>}
          {isAdmin&&nextStatus&&<Btn sm onClick={()=>handleStatusChange(nextStatus)} color={STATUS[nextStatus]?.color}>→ {STATUS[nextStatus]?.label}</Btn>}
          {isAdmin&&<Btn sm danger onClick={deleteJob}>🗑 ลบ</Btn>}
          {!isAdmin&&job.status!=='done'&&<Btn sm color={T.amber} onClick={handleAlert}>🔔 แจ้งเตือน{(job.statusAlerts||[]).length>0?` (${job.statusAlerts.length}/2)`:''}</Btn>}
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(auto-fill,minmax(${mob?'140px':'160px'},1fr))`,gap:12,marginBottom:14}}>
        <StatCard icon="💰" label="รับเงินแล้ว" value={baht(totalInc)} color={T.green}/>
        <StatCard icon="📈" label="มูลค่ารวมของงาน" value={baht(jobExpected)} sub="รวมยังไม่ได้รับ" color={T.amber}/>
        <StatCard icon="🧾" label="งบค่าใช้จ่ายงาน (บีลาบริหาร)" value={baht(budget60)} color={T.amber}/>
        <StatCard icon="📤" label="ใช้ไปแล้ว" value={baht(totalExp)} color={T.muted}/>
        <StatCard icon="📊" label="คงเหลือในงบ" value={baht(remaining60)} color={remaining60>=0?T.green:T.red}/>
      </div>
      {totalInc>0&&(
        <Card style={{background:T.s2,marginBottom:14}}>
          <div style={{fontSize:13,color:T.muted,marginBottom:8}}>💰 กำไรสุทธิที่แบ่งเข้ากองกลางบริษัทแล้ว</div>
          <div style={{display:'flex',gap:18,flexWrap:'wrap'}}>
            <div><div style={{fontSize:11,color:T.muted}}>🏠 หมุนเวียน</div><div style={{fontSize:15,fontWeight:700,color:T.blue}}>{baht(workingCapCut)}</div></div>
            <div><div style={{fontSize:11,color:T.muted}}>💸 ปันผล</div><div style={{fontSize:15,fontWeight:700,color:T.green}}>{baht(dividendCut)}</div></div>
            <div><div style={{fontSize:11,color:T.muted}}>🎁 โบนัส</div><div style={{fontSize:15,fontWeight:700,color:T.gold}}>{baht(bonusCut)}</div></div>
          </div>
        </Card>
      )}
      {job.notes&&<Card style={{background:T.s2}}><p style={{fontSize:13,color:T.muted,marginBottom:2}}>📝 หมายเหตุ</p><p style={{fontSize:14}}>{job.notes}</p></Card>}
      <div style={{display:'flex',gap:4,marginBottom:16,borderBottom:`1px solid ${T.bdr}`,overflowX:'auto'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:'none',border:'none',borderBottom:`2px solid ${tab===t.id?T.gold:'transparent'}`,padding:'10px 16px',color:tab===t.id?T.gold:T.muted,fontWeight:tab===t.id?600:400,cursor:'pointer',fontSize:mob?13:14,fontFamily:T.ff,transition:'all .15s',whiteSpace:'nowrap'}}>
            {t.label}
          </button>
        ))}
      </div>
      {tab==='income'&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <h3 style={{fontSize:15,fontWeight:700,color:T.text}}>รายรับ</h3>

          {['deposit','remaining'].map(field=>{
            const inc=job.income?.[field]||{};

                <Card key={e.id} style={{padding:'14px 18px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:4}}>

function IncomeForm({job,state,user,save,onClose}){
  const [inc,setInc]=useState({
    deposit:{amount:job.income?.deposit?.amount||0,date:job.income?.deposit?.date||'',received:job.income?.deposit?.received||false,slipData:job.income?.deposit?.slipData||null},
    remaining:{amount:job.income?.remaining?.amount||0,date:job.income?.remaining?.date||'',received:job.income?.remaining?.received||false,slipData:job.income?.remaining?.slipData||null},
  });
  const [extras,setExtras]=useState((job.income?.extras||[]).map(x=>({...x})));
  const set=(field,k)=>e=>setInc(p=>({...p,[field]:{...p[field],[k]:e.target.value}}));
  const toggle=field=>setInc(p=>({...p,[field]:{...p[field],received:!p[field].received}}));
  const addExtra=()=>setExtras(p=>[...p,{id:uid(),label:'',amount:0,date:'',received:false}]);
  const setExtra=(id,k)=>e=>setExtras(p=>p.map(x=>x.id===id?{...x,[k]:e.target.value}:x));
  const toggleExtra=id=>setExtras(p=>p.map(x=>x.id===id?{...x,received:!x.received}:x));
  const removeExtra=id=>{ if(!window.confirm('ลบรายการเสริมนี้?')) return; setExtras(p=>p.filter(x=>x.id!==id)); };
  const submit=async()=>{
    const currentRatio=state.settings?.splitRatios||DEFAULT_RATIO;
    const stamp=(orig,updated)=>{
      if(!updated.received) return {...updated,ratio:null};
      if(orig?.received&&orig?.ratio) return {...updated,ratio:orig.ratio};
      return {...updated,ratio:currentRatio};
    };
    const finalExtras=extras.map(x=>{
      const orig=(job.income?.extras||[]).find(o=>o.id===x.id);
      return stamp(orig,x);
    });
    const income={
      deposit:stamp(job.income?.deposit,inc.deposit),
      remaining:stamp(job.income?.remaining,inc.remaining),
      extras:finalExtras,
    };
    const jobs=state.jobs.map(j=>j.id===job.id?{...j,income}:j);
    const hist=[{id:uid(),type:'income',desc:`อัปเดตรายรับ: ${job.clientName}`,userId:user.id,jobId:job.id,createdAt:ts()},...state.hist].slice(0,500);
    await save({jobs,hist}); onClose();
  };
  return (
    <Modal title="แก้ไขรายรับ" onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {['deposit','remaining'].map(field=>{
          const label=field==='deposit'?'เงินมัดจำ':'ยอดที่เหลือ';
          return (
            <div key={field} style={{background:T.s2,borderRadius:10,padding:14}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:10,color:T.gold}}>{label}</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <Inp label="จำนวนเงิน (บาท)" type="number" value={inc[field].amount} onChange={set(field,'amount')} min="0" step="100"/>
                <Inp label="วันที่รับ" type="date" value={inc[field].date} onChange={set(field,'date')}/>
                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14}}>
                  <input type="checkbox" checked={inc[field].received} onChange={()=>toggle(field)} style={{width:16,height:16,accentColor:T.gold}}/>
                  <span>รับเงินแล้ว</span>
                </label>
              </div>
            </div>
          );
        })}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontWeight:600,fontSize:14,color:T.gold}}>รายการเสริม</div>
            <Btn sm ghost onClick={addExtra}>+ เพิ่มรายการ</Btn>
          </div>
          <p style={{fontSize:11,color:T.muted,marginBottom:10}}>เช่น ค่าน้ำมันรถ, ช่อดอกไม้เจ้าสาว, แพ็คเกจเสริม</p>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {extras.map(x=>(
              <div key={x.id} style={{background:T.s2,borderRadius:10,padding:14}}>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:6}}>
                  <button onClick={()=>removeExtra(x.id)} style={{background:'none',border:'none',color:T.red,cursor:'pointer',fontSize:12,fontFamily:T.ff}}>🗑 ลบ</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <Inp label="ชื่อรายการ" value={x.label} onChange={setExtra(x.id,'label')} placeholder="เช่น ช่อดอกไม้เจ้าสาว"/>
                  <Inp label="จำนวนเงิน (บาท)" type="number" value={x.amount} onChange={setExtra(x.id,'amount')} min="0" step="100"/>
                  <Inp label="วันที่รับ" type="date" value={x.date} onChange={setExtra(x.id,'date')}/>
                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14}}>
                    <input type="checkbox" checked={x.received} onChange={()=>toggleExtra(x.id)} style={{width:16,height:16,accentColor:T.gold}}/>
                    <span>รับเงินแล้ว</span>
                  </label>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <Btn ghost onClick={onClose}>ยกเลิก</Btn><Btn onClick={submit}>บันทึก</Btn>
        </div>
      </div>
    </Modal>
  );
}

function DividendForm({state,user,save,onClose,pools,editing}){
  const editingBonusSum=editing?(editing.bonus||editing.wages||[]).reduce((s,w)=>s+Number(w.amount||0),0):0;
  const availableDividend=pools.dividendPoolBalance+(editing?editing.totalAmount:0);
  const availableBonus=pools.bonusPoolBalance+editingBonusSum;
  const [date,setDate]=useState(editing?.date||new Date().toISOString().split('T')[0]);
  const [total,setTotal]=useState((editing?editing.totalAmount:Math.max(0,availableDividend)).toString());
  const [notes,setNotes]=useState(editing?.notes||'');
  const [bonus,setBonus]=useState(state.users.map(u=>{
    const existing=(editing?.bonus||editing?.wages||[]).find(w=>w.uid===u.id);
    return {uid:u.id,amount:existing?String(existing.amount):'0',include:!!existing};
  }));
  const totalNum=Number(total)||0;
  const shares=state.users.map(u=>({uid:u.id,amount:Math.round(totalNum*u.share/100)}));
  const setB=(uid,k,v)=>setBonus(p=>p.map(w=>w.uid===uid?{...w,[k]:v}:w));
  const bonusSum=bonus.filter(w=>w.include).reduce((s,w)=>s+(Number(w.amount)||0),0);
  const submit=async()=>{
    if(!total||totalNum<=0){alert('กรอกยอดปันผล');return;}
    const bonusList=bonus.filter(w=>w.include&&Number(w.amount)>0).map(w=>({...w,amount:Number(w.amount)}));
    if(editing){
      const nd={...editing,date,totalAmount:totalNum,notes,shares,bonus:bonusList};

            <span style={{fontSize:12,color:bonusSum>availableBonus?T.red:T.muted}}>{baht(bonusSum)} / {baht(availableBonus)}</span>

          {bonus.map(w=>{const u=state.users.find(x=>x.id===w.uid);return(
            <div key={w.uid} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <input type="checkbox" checked={w.include} onChange={e=>setB(w.uid,'include',e.target.checked)} style={{width:16,height:16,accentColor:T.gold}}/>
              <span style={{fontSize:13,width:70,color:u.color}}>{u.name}</span>
              {w.include&&<input type="number" value={w.amount} onChange={e=>setB(w.uid,'amount',e.target.value)} min="0" placeholder="0"
                style={{background:T.bg,border:`1px solid ${T.bdr}`,borderRadius:6,padding:'5px 8px',color:T.text,fontSize:13,width:100,fontFamily:T.ff}}/>}
            </div>
          );})}
          {bonusSum>availableBonus&&<p style={{fontSize:11,color:T.red,marginTop:4}}>⚠️ ยอดโบนัสเกินกองทุนคงเหลือ</p>}

/* ═══ TRANSFER (โอนย้ายเงินระหว่างกองทุน) ═══ */

const POOL_LABEL={workingCapital:{l:'เงินหมุนเวียน',i:'🏠',c:T.blue},dividend:{l:'เงินปันผล',i:'💸',c:T.green},bonus:{l:'เงินโบนัส',i:'🎁',c:T.gold},external:{l:'เงินสดเก่า/นอกระบบ',i:'🗂️',c:T.muted}};

    const hist=[{id:uid(),type:'delete',desc:`ยกเลิกการโอนเงิน ${baht(t.amount)} (${POOL_LABEL[t.from].l}→${POOL_LABEL[t.to].l})`,userId:user.id,createdAt:ts()},...state.hist].slice(0,500);
    await save({transfers:list.filter(x=>x.id!==t.id),hist});
  };
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>

      {list.length===0?<Empty msg="ยังไม่มีการโอนย้ายเงิน"/>:

                    <Badge c={POOL_LABEL[t.to].c}>{POOL_LABEL[t.to].i} {POOL_LABEL[t.to].l}</Badge>
                  </div>

function TransferForm({state,user,save,balances,onClose}){
  const [f,setF]=useState({from:'external',to:'dividend',amount:'',note:'',date:new Date().toISOString().split('T')[0]});
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const amtNum=Number(f.amount)||0;
  const overBalance=f.from!=='external'&&f.from!=='all40'&&amtNum>balances[f.from];
  const ratio={...DEFAULT_RATIO,...(state.settings?.splitRatios||{})};
  const profitTotal=(Number(ratio.workingCapital)||0)+(Number(ratio.dividend)||0)+(Number(ratio.bonus)||0)||1;
  const SPLIT40=[
    {k:'workingCapital',ratio:(Number(ratio.workingCapital)||0)/profitTotal},
    {k:'dividend',ratio:(Number(ratio.dividend)||0)/profitTotal},
    {k:'bonus',ratio:(Number(ratio.bonus)||0)/profitTotal},
  ]; // สัดส่วนภายในกองกำไร คำนวณจากค่าปัจจุบันในหน้าตั้งค่า
  const submit=async()=>{
    if(f.from===f.to){alert('กองต้นทางและปลายทางต้องไม่ใช่กองเดียวกัน');return;}
    if(!amtNum||amtNum<=0){alert('กรอกจำนวนเงิน');return;}
    if(f.to==='all40'){
      const newTransfers=[],newHist=[];
      SPLIT40.forEach(s=>{
        const amt=Math.round(amtNum*s.ratio*100)/100;
        if(amt<=0)return;
        newTransfers.push({id:uid(),from:f.from,to:s.k,amount:amt,note:f.note?`${f.note} (แบ่งจากกองทุนกำไรอัตโนมัติ)`:'แบ่งจากกองทุนกำไรอัตโนมัติ',date:f.date,createdBy:user.id,createdAt:ts()});
        newHist.push({id:uid(),type:'transfer',desc:`โอนเงิน ${baht(amt)} จาก${POOL_LABEL[f.from].l} → ${POOL_LABEL[s.k].l} (แบ่งจากกองทุนกำไรอัตโนมัติ)`,userId:user.id,amount:amt,createdAt:ts()});
      });
      const hist=[...newHist,...state.hist].slice(0,500);
      await save({transfers:[...newTransfers,...(state.transfers||[])],hist}); onClose();
      return;
    }
    const nt={id:uid(),from:f.from,to:f.to,amount:amtNum,note:f.note,date:f.date,createdBy:user.id,createdAt:ts()};
    const hist=[{id:uid(),type:'transfer',desc:`โอนเงิน ${baht(amtNum)} จาก${POOL_LABEL[f.from].l} → ${POOL_LABEL[f.to].l}`,userId:user.id,amount:amtNum,createdAt:ts()},...state.hist].slice(0,500);
    await save({transfers:[nt,...(state.transfers||[])],hist}); onClose();
  };
  const fromOptions=[{v:'external',l:`🗂️ เงินสดเก่า/นอกระบบ (ยอดยกมา)`},...REAL_POOLS.map(k=>({v:k,l:`${POOL_LABEL[k].i} ${POOL_LABEL[k].l} (คงเหลือ ${baht(balances[k])})`}))];
  const toOptions=[{v:'all40',l:`📦 กองทุนกำไร (แบ่งอัตโนมัติ ${ratio.workingCapital}/${ratio.dividend}/${ratio.bonus}%)`},...REAL_POOLS.map(k=>({v:k,l:`${POOL_LABEL[k].i} ${POOL_LABEL[k].l} (คงเหลือ ${baht(balances[k])})`})),{v:'external',l:`🗂️ เงินสดเก่า/นอกระบบ (ตัดออก)`}];
  return (
    <Modal title="โอนย้ายเงิน / ปรับยอดกองทุน" onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Inp label="จากกอง" type="select" value={f.from} onChange={set('from')} options={fromOptions}/>
        <Inp label="ไปกอง" type="select" value={f.to} onChange={set('to')} options={toOptions}/>
        <Inp label="จำนวนเงิน (บาท) *" type="number" value={f.amount} onChange={set('amount')} min="0" step="50"/>
        {f.from==='external'&&<p style={{fontSize:11,color:T.muted}}>💡 ใช้ตัวเลือกนี้สำหรับเงินที่มีอยู่จริงนอกระบบ เช่น ยอดปันผลเก่าก่อนใช้แอป ระบบจะเติมยอดเข้ากองโดยไม่หักจากกองอื่น</p>}
        {overBalance&&<p style={{fontSize:11,color:T.red}}>⚠️ ยอดโอนเกินยอดคงเหลือในกองต้นทาง</p>}
        <Inp label="หมายเหตุ" value={f.note} onChange={set('note')} placeholder="เช่น ยอดปันผลยกมาจากเดือนก่อนใช้แอป"/>
        <Inp label="วันที่" type="date" value={f.date} onChange={set('date')}/>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <Btn ghost onClick={onClose}>ยกเลิก</Btn><Btn onClick={submit}>โอนเงิน</Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ HISTORY ═══ */
function History({state}){
  const {hist,jobs,users}=state;
  const TYPES={create:{c:T.blue,i:'🆕'},edit:{c:T.muted,i:'✏️'},delete:{c:T.red,i:'🗑'},income:{c:T.green,i:'💰'},expense:{c:T.amber,i:'🧾'},reimburse:{c:T.blue,i:'💼'},status:{c:T.gold,i:'🔄'},alert:{c:T.amber,i:'🔔'},auto:{c:T.gold,i:'🤖'},dividend:{c:T.gold,i:'💸'},transfer:{c:T.blue,i:'🔄'},default:{c:T.muted,i:'📌'}};
  const exportAll=()=>{
    const rows=[['วันที่','ประเภท','รายการ','จำนวน','ผู้ดำเนินการ','งาน']];
    hist.forEach(h=>{const u=users.find(x=>x.id===h.userId);const j=h.jobId?jobs.find(x=>x.id===h.jobId):null;rows.push([dtFull(h.createdAt),h.type,h.desc,h.amount||'',u?.name||'',j?.clientName||'']);});
    exportCSV(rows,'history.csv');
  };
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><h1 style={{fontSize:22,fontWeight:700,color:T.gold}}>ประวัติการเคลื่อนไหว</h1><p style={{color:T.muted,fontSize:13}}>{hist.length} รายการ</p></div>
        <Btn ghost sm onClick={exportAll}>⬇ Export CSV</Btn>
      </div>
      {hist.length===0?<Empty/>:hist.map(h=>{
        const t=TYPES[h.type]||TYPES.default;
        const u=users.find(x=>x.id===h.userId);
        const j=h.jobId?jobs.find(x=>x.id===h.jobId):null;
        return (
          <div key={h.id} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'12px 0',borderBottom:`1px solid ${T.bdr}`}}>
            <div style={{width:32,height:32,borderRadius:8,background:t.c+'22',border:`1px solid ${t.c}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>{t.i}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14}}>{h.desc}</div>
              <div style={{fontSize:11,color:T.muted,marginTop:3}}>{dtFull(h.createdAt)} · {u?.name||'ระบบ'}{j&&<span style={{color:T.gold}}> · {j.clientName}</span>}</div>
            </div>
            {h.amount>0&&<div style={{fontSize:14,fontWeight:600,color:t.c,whiteSpace:'nowrap'}}>{baht(h.amount)}</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ═══ NOTIFICATIONS ═══ */
function Notifications({state,user,save}){
  const myNotifs=state.notifs.filter(n=>!n.forAdmin||(n.forAdmin&&user.role==='admin'));
  const markRead=async id=>{const ns=state.notifs.map(n=>n.id===id?{...n,readBy:[...(n.readBy||[]),user.id]}:n);await save({notifs:ns});};
  const markAll=async()=>{const ns=state.notifs.map(n=>({...n,readBy:[...(n.readBy||[]),...(!n.readBy?.includes(user.id)?[user.id]:[])]}));await save({notifs:ns});};
  const unread=myNotifs.filter(n=>!(n.readBy||[]).includes(user.id));
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div><h1 style={{fontSize:22,fontWeight:700,color:T.gold}}>การแจ้งเตือน</h1><p style={{color:T.muted,fontSize:13}}>{unread.length} ยังไม่ได้อ่าน</p></div>
        {unread.length>0&&<Btn sm ghost onClick={markAll}>อ่านทั้งหมด</Btn>}
      </div>
      {myNotifs.length===0?<Empty msg="ไม่มีการแจ้งเตือน"/>:
        [...myNotifs].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).map(n=>{
          const isRead=(n.readBy||[]).includes(user.id);
          const icon={alert:'🔔',auto_update:'🤖',status_change:'🔄'}[n.type]||'📌';
          const c={alert:T.amber,auto_update:T.gold,status_change:T.blue}[n.type]||T.muted;
          return (
            <div key={n.id} onClick={()=>markRead(n.id)} style={{background:isRead?T.s1:T.s2,border:`1px solid ${isRead?T.bdr:c+'55'}`,borderRadius:12,padding:'14px 16px',marginBottom:10,cursor:'pointer',transition:'all .15s',opacity:isRead?.7:1}}>
              <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                <span style={{fontSize:18}}>{icon}</span>
                <div style={{flex:1}}><p style={{fontSize:14,marginBottom:4,color:isRead?T.muted:T.text}}>{n.msg}</p><p style={{fontSize:11,color:T.dim}}>{dtFull(n.createdAt)}</p></div>
                {!isRead&&<div style={{width:8,height:8,borderRadius:'50%',background:c,flexShrink:0,marginTop:5}}/>}
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

function Settings({state,user,save,setUser}){
  const [users,setUsers]=useState(state.users.map(u=>({...u})));
  const [sett,setSett]=useState({...SEED_SETTINGS,...(state.settings||{})});
  const [showAdd,setShowAdd]=useState(false);
  const isAdmin=user.role==='admin';
  const mob=useMobile();
  const set=(id,k)=>e=>setUsers(p=>p.map(u=>u.id===id?{...u,[k]:e.target.value}:u));
  const setRole=(id,role)=>setUsers(p=>p.map(u=>u.id===id?{...u,role}:u));
  const setExpenseManager=(id)=>setUsers(p=>p.map(u=>({...u,expenseManager:u.id===id})));
  const setColor=(id,color)=>setUsers(p=>p.map(u=>u.id===id?{...u,color}:u));
  const totalShare=users.reduce((s,u)=>s+Number(u.share||0),0);

  const handlePhoto=(userId,photoData)=>{
    setUsers(p=>p.map(u=>u.id===userId?{...u,photo:photoData}:u));
  };
  const removePhoto=(userId)=>{
    setUsers(p=>p.map(u=>u.id===userId?{...u,photo:null}:u));
  };

  const removeUser=(id)=>{
    if(id===user.id){alert('ไม่สามารถลบตัวเองได้');return;}
    const admins=users.filter(u=>u.role==='admin'&&u.id!==id);
    if(users.find(u=>u.id===id)?.role==='admin'&&admins.length===0){alert('ต้องมี Admin อย่างน้อย 1 คน');return;}
    if(!window.confirm(`ลบ "${users.find(u=>u.id===id)?.name}"?`)) return;
    setUsers(p=>p.filter(u=>u.id!==id));
  };

  const saveUsers=async()=>{
    if(Math.abs(totalShare-100)>0.01){alert(`สัดส่วนหุ้นรวมต้องได้ 100% (ปัจจุบัน: ${totalShare.toFixed(1)}%)`);return;}
    await save({users});
    const me=users.find(u=>u.id===user.id);
    if(me) setUser(me);
    alert('บันทึกข้อมูลผู้ถือหุ้นสำเร็จ');
  };

  const setRatio=(k)=>e=>setSett(p=>({...p,splitRatios:{...(p.splitRatios||DEFAULT_RATIO),[k]:e.target.value}}));
  const ratio={...DEFAULT_RATIO,...(sett.splitRatios||{})};
  const ratioSum=Number(ratio.jobBudget||0)+Number(ratio.workingCapital||0)+Number(ratio.dividend||0)+Number(ratio.bonus||0);

  const saveApp=async()=>{
    if(!sett.appName.trim()){alert('กรุณากรอกชื่อแอป');return;}
    if(Math.abs(ratioSum-100)>0.01){alert(`สัดส่วนแบ่งรายรับรวมต้องได้ 100% (ปัจจุบัน: ${ratioSum}%)`);return;}
    await save({settings:sett});
    document.title=sett.appName;
    alert('บันทึกตั้งค่าแอปสำเร็จ');
  };

  const exportAll=()=>{
    const rows=[['ชื่อลูกค้า','วันงาน','ราคาตกลง','รายการเสริม','รายได้รวมทั้งหมด','รับเงินแล้ว','รายจ่าย','กำไร','สถานะ']];
    state.jobs.forEach(j=>{
      const inc=jobReceivedTotal(j);
      const extrasTotal=jobExtrasTotal(j,false);
      const expected=jobExpectedTotal(j);
      const exp=(j.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
      rows.push([j.clientName,dtTH(j.eventDate),j.agreedPrice,extrasTotal,expected,inc,exp,inc-exp,STATUS[j.status]?.label]);
    });
    exportCSV(rows,'jobs-report.csv');
  };

  return (
    <div>
      <h1 style={{fontSize:22,fontWeight:700,color:T.gold,marginBottom:20}}>ตั้งค่า</h1>

      {/* App Settings */}
      {isAdmin&&(
        <Card>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>🎨 ตั้งค่าแอป</h3>
          <div style={{marginBottom:12}}>
            <Inp label="ชื่อแอป / ธุรกิจ" value={sett.appName} onChange={e=>setSett(p=>({...p,appName:e.target.value}))} placeholder="Backdrop Studio"/>
          </div>
          <div style={{marginBottom:12,display:'flex',flexDirection:'column',gap:6}}>
            <label style={{fontSize:12,color:T.muted,letterSpacing:'.04em'}}>ไอคอนแอป</label>
            <IconPickerField value={sett.appIcon} onChange={v=>setSett(p=>({...p,appIcon:v}))}/>
            {!isImgIcon(sett.appIcon)&&(
              <div style={{maxWidth:200,marginTop:4}}>
                <Inp label="หรือพิมพ์ Emoji" value={sett.appIcon} onChange={e=>setSett(p=>({...p,appIcon:e.target.value}))} placeholder="💐"/>
              </div>
            )}
          </div>
          <div style={{marginBottom:14}}>
            <Inp label="คำบรรยายใต้ชื่อ" value={sett.subtitle} onChange={e=>setSett(p=>({...p,subtitle:e.target.value}))} placeholder="ระบบบัญชีธุรกิจ"/>
          </div>
          <div style={{background:T.s2,borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
            <AppIcon icon={sett.appIcon} size={32}/>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:T.gold}}>{sett.appName||'ชื่อแอป'}</div>
              <div style={{fontSize:12,color:T.muted}}>{sett.subtitle||'คำบรรยาย'}</div>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end'}}><Btn onClick={saveApp}>💾 บันทึกตั้งค่าแอป</Btn></div>
        </Card>
      )}

      {/* Split Ratio Settings */}
      {isAdmin&&(
        <Card>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:6}}>📊 สัดส่วนแบ่งรายรับ</h3>
          <p style={{fontSize:12,color:T.muted,marginBottom:16}}>สัดส่วนนี้จะถูก "ล็อก" ไว้ทุกครั้งที่ติ๊กรับเงินแล้ว การเปลี่ยนตรงนี้จะมีผลกับเงินที่รับใหม่เท่านั้น ไม่กระทบเงินที่เคยรับไปแล้ว</p>
          <div style={{display:'grid',gridTemplateColumns:mob?'1fr 1fr':'repeat(4,1fr)',gap:12,marginBottom:10}}>
            <Inp label="🧾 งบค่าใช้จ่ายงาน %" type="number" value={ratio.jobBudget} onChange={setRatio('jobBudget')} min="0" max="100" step="1"/>
            <Inp label="🏠 เงินหมุนเวียน %" type="number" value={ratio.workingCapital} onChange={setRatio('workingCapital')} min="0" max="100" step="1"/>
            <Inp label="💸 เงินปันผล %" type="number" value={ratio.dividend} onChange={setRatio('dividend')} min="0" max="100" step="1"/>
            <Inp label="🎁 เงินโบนัส %" type="number" value={ratio.bonus} onChange={setRatio('bonus')} min="0" max="100" step="1"/>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:Math.abs(ratioSum-100)>0.01?T.red:T.green,marginBottom:14}}>
            รวม {ratioSum}% {Math.abs(ratioSum-100)>0.01?'(ต้องรวมให้ได้ 100%)':'✓'}
          </div>
          <div style={{display:'flex',justifyContent:'flex-end'}}><Btn onClick={saveApp}>💾 บันทึกสัดส่วน</Btn></div>
        </Card>
      )}

      {/* Shareholders */}
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
          <h3 style={{fontSize:15,fontWeight:700}}>👥 ผู้ถือหุ้น & สิทธิ์</h3>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:13,color:Math.abs(totalShare-100)<0.01?T.green:T.red,fontWeight:600}}>รวม {totalShare.toFixed(1)}%</span>
            {isAdmin&&<Btn sm onClick={()=>setShowAdd(true)}>+ เพิ่มผู้ถือหุ้น</Btn>}
          </div>
        </div>
        {users.map(u=>(
          <div key={u.id} style={{background:T.s2,borderRadius:12,padding:'14px 16px',marginBottom:12,border:`1px solid ${T.bdr}`}}>
            {/* Header row */}
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexWrap:'wrap'}}>
              <PhotoAvatar user={u} size={40} canEdit={isAdmin||u.id===user.id} onUpload={data=>handlePhoto(u.id,data)}/>
              <div style={{flex:1,minWidth:120}}>
                {isAdmin
                  ? <input value={u.name} onChange={set(u.id,'name')} style={{background:'transparent',border:'none',borderBottom:`1px solid ${T.bdr}`,color:T.text,fontSize:15,fontWeight:600,fontFamily:T.ff,outline:'none',width:'100%',paddingBottom:2}}/>
                  : <div style={{fontSize:15,fontWeight:600}}>{u.name}</div>
                }
                <div style={{fontSize:11,color:T.muted,marginTop:2}}>{u.id===user.id?'(คุณ) ':''}{u.role==='admin'?'Admin':'Member'}</div>
              </div>
              {isAdmin&&(
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <button onClick={()=>setRole(u.id,'admin')} style={{background:u.role==='admin'?T.gold+'33':'transparent',border:`1px solid ${u.role==='admin'?T.gold:T.bdr}`,borderRadius:6,padding:'4px 10px',color:u.role==='admin'?T.gold:T.muted,cursor:'pointer',fontSize:11,fontFamily:T.ff}}>Admin</button>
                  <button onClick={()=>setRole(u.id,'member')} style={{background:u.role==='member'?T.blue+'33':'transparent',border:`1px solid ${u.role==='member'?T.blue:T.bdr}`,borderRadius:6,padding:'4px 10px',color:u.role==='member'?T.blue:T.muted,cursor:'pointer',fontSize:11,fontFamily:T.ff}}>Member</button>
                  <button onClick={()=>setExpenseManager(u.id)} title="ผู้บริหารงบค่าใช้จ่ายงาน" style={{background:u.expenseManager?T.amber+'33':'transparent',border:`1px solid ${u.expenseManager?T.amber:T.bdr}`,borderRadius:6,padding:'4px 10px',color:u.expenseManager?T.amber:T.muted,cursor:'pointer',fontSize:11,fontFamily:T.ff}}>💼 ผู้คุมงบ</button>
                  {u.id!==user.id&&<button onClick={()=>removeUser(u.id)} style={{background:'transparent',border:`1px solid ${T.red}44`,borderRadius:6,padding:'4px 8px',color:T.red,cursor:'pointer',fontSize:11,fontFamily:T.ff}}>ลบ</button>}
                </div>
              )}
            </div>
            {/* Color palette */}
            {isAdmin&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:T.muted,marginBottom:6}}>สีประจำตัว</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {PALETTE.map(c=><div key={c} onClick={()=>setColor(u.id,c)} style={{width:22,height:22,borderRadius:'50%',background:c,border:`2px solid ${u.color===c?'#fff':'transparent'}`,cursor:'pointer',boxShadow:u.color===c?`0 0 0 2px ${c}`:'none',transition:'all .1s'}}/>)}
                </div>
              </div>
            )}
            {/* Photo remove button */}
            {(isAdmin||u.id===user.id)&&u.photo&&(
              <div style={{marginBottom:10}}>
                <button onClick={()=>removePhoto(u.id)} style={{background:'none',border:`1px solid ${T.bdr}`,borderRadius:6,padding:'4px 10px',color:T.muted,cursor:'pointer',fontSize:11,fontFamily:T.ff}}>🗑 ลบรูปโปรไฟล์</button>
              </div>
            )}
            {/* Fields */}
            <div style={{display:'grid',gridTemplateColumns:mob?'1fr':'1fr 1fr',gap:10}}>
              {isAdmin&&<Inp label="PIN" type="password" value={u.pin} onChange={set(u.id,'pin')} placeholder="••••"/>}
              <Inp label="% หุ้น" type="number" value={u.share} onChange={isAdmin||u.id===user.id?set(u.id,'share'):()=>{}} min="0" max="100" step="0.5"/>
            </div>
          </div>
        ))}
        {isAdmin&&(
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn onClick={saveUsers}>💾 บันทึกข้อมูลผู้ถือหุ้น</Btn>
          </div>
        )}
      </Card>

      {/* Export */}
      <Card>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>📥 Export ข้อมูล</h3>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <Btn ghost onClick={exportAll}>⬇ Export รายงานงาน (CSV)</Btn>
          <Btn ghost onClick={()=>{
            const rows=[['วันที่','ประเภท','รายการ','จำนวน','ผู้ดำเนินการ']];
            state.hist.forEach(h=>{const u=state.users.find(x=>x.id===h.userId);rows.push([dtFull(h.createdAt),h.type,h.desc,h.amount||'',u?.name||'']);});
            exportCSV(rows,'history.csv');
          }}>⬇ Export ประวัติ (CSV)</Btn>
        </div>
      </Card>

      {/* About */}
      <Card>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>ℹ️ เกี่ยวกับ</h3>
        <p style={{color:T.muted,fontSize:13}}>{sett.appName} · ข้อมูลเก็บใน Firebase Realtime Database · ทุกคนในกลุ่มเห็นข้อมูลเดียวกันแบบ real-time</p>
        <p style={{color:T.muted,fontSize:12,marginTop:6}}>🔔 อัปเดตอัตโนมัติ: สมาชิก 2 คนขึ้นไปกดแจ้งเตือน → สถานะเลื่อนไปยังขั้นต่อไปโดยอัตโนมัติ</p>
      </Card>

      {showAdd&&<AddUserModal onAdd={u=>{setUsers(p=>[...p,u]);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

/* ═══ ROOT APP ═══ */
function App(){
  const [state,setState]=useState(null);
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('dashboard');
  const [jobId,setJobId]=useState(null);
  const [loading,setLoading]=useState(true);
  const [fbError,setFbError]=useState(null);
  const mob=useMobile();

  useEffect(()=>{
    const init=async()=>{
      try {
        let users   =await DB.get('users')    ||SEED_USERS;
        const jobs    =await DB.get('jobs')     ||[];
        const divs    =await DB.get('divs')     ||[];
        const notifs  =await DB.get('notifs')   ||[];
        const hist    =await DB.get('hist')     ||[];
        const settings=await DB.get('settings') ||SEED_SETTINGS;
        const companyExpenses=await DB.get('companyExpenses') ||[];
        const transfers=await DB.get('transfers') ||[];
        const existing=await DB.get('users');
        if(!existing) await DB.set('users',SEED_USERS);
        else if(!users.some(u=>u.expenseManager===true)){
          const bila=users.find(u=>u.id==='bila');
          users=users.map(u=>({...u,expenseManager:bila?u.id==='bila':u.id===users[0].id}));
          await DB.set('users',users);
        }
        setState({users,jobs,divs,notifs,hist,settings,companyExpenses,transfers});
        document.title=(settings||SEED_SETTINGS).appName;
        setLoading(false);
      } catch(e){
        setFbError(e.message||'เชื่อมต่อ Firebase ไม่ได้');
        setLoading(false);
      }
    };
    if(window._fbReady){ init(); } else { window.addEventListener('fb-ready',init,{once:true}); }
  },[]);

  const save=async patches=>{
    const next={...state,...patches};
    setState(next);
    for(const [k,v] of Object.entries(patches)) await DB.set(k,v);
    return next;
  };

  if(loading) return (
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14}}>
      <Spin/><div style={{color:T.muted,fontSize:14}}>กำลังโหลด...</div>
    </div>
  );

  if(fbError) return (
    <div style={{minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14,padding:20}}>
      <div style={{fontSize:40}}>🔥</div>
      <div style={{color:T.red,fontSize:18,fontWeight:700}}>เชื่อมต่อ Firebase ไม่ได้</div>
      <div style={{color:T.muted,fontSize:14}}>{fbError}</div>
      <div style={{background:T.s2,border:`1px solid ${T.bdr}`,borderRadius:10,padding:'14px 20px',fontSize:13,color:T.amber,maxWidth:400,textAlign:'center'}}>
        แก้ไข Rules ใน Firebase Console:<br/>
        <code style={{color:T.text}}>{'{ "rules": { ".read": true, ".write": true } }'}</code>
      </div>
    </div>
  );

  if(!user) return <LoginPage users={state.users} onLogin={setUser} settings={state.settings}/>;

  const unread=state.notifs.filter(n=>!(n.readBy||[]).includes(user.id)&&(!n.forAdmin||(n.forAdmin&&user.role==='admin'))).length;
  const setPageNav=p=>{setPage(p);if(p!=='jobs')setJobId(null);};

  const content=(
    <>
      {page==='dashboard'&&<Dashboard state={state} user={user} save={save} setPage={setPageNav} setJobId={setJobId}/>}
      {page==='schedule'&&<Schedule state={state} user={user} save={save} setPage={setPageNav} setJobId={setJobId}/>}
      {page==='jobs'&&<Jobs state={state} user={user} save={save} jobId={jobId} setJobId={setJobId}/>}
      {page==='funds'&&<Funds state={state} user={user} save={save}/>}
      {page==='hist'&&<History state={state} user={user} save={save}/>}
      {page==='notifs'&&<Notifications state={state} user={user} save={save}/>}
      {page==='settings'&&<Settings state={state} user={user} save={save} setUser={setUser}/>}
    </>
  );

  if(mob){
    return (
      <div style={{minHeight:'100vh',background:T.bg}}>
        <main style={{padding:'18px 14px 76px',minHeight:'100vh'}}>{content}</main>
        <BottomNav page={page} setPage={setPageNav} user={user} onLogout={()=>setUser(null)} unread={unread}/>
      </div>
    );
  }

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar page={page} setPage={setPageNav} user={user} onLogout={()=>setUser(null)} unread={unread} settings={state.settings}/>
      <main style={{flex:1,overflow:'auto',padding:'28px 30px',background:T.bg}}>{content}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
